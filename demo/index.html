<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>textpour demo</title>
    <!--
      Run me:
        npm install && npm run build
        npx http-server .   (or any static server; ES modules + Pretext need http, not file://)
        open /demo/index.html
      Pretext is pulled from esm.sh via the import map below; the kernel is the built ./dist output.
    -->
    <script type="importmap">
      { "imports": { "@chenglou/pretext": "https://esm.sh/@chenglou/pretext" } }
    </script>
    <style>
      body { font: 15px system-ui, sans-serif; margin: 24px; color: #222; }
      canvas { border: 1px solid #ccc; display: block; margin: 12px 0; }
      label { display: inline-flex; gap: 8px; align-items: center; }
      .muted { color: #666; }
      .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <h1>textpour</h1>
    <p class="muted">Text poured into shapes via Pretext line-breaking. Drag to reflow (reuses one prepared pass).</p>
    <div class="controls">
      <label>shape
        <select id="shape">
          <option value="circle">circle</option>
          <option value="donut">donut (multi-span)</option>
          <option value="star">star (concave, multi-span)</option>
          <option value="heart">heart (SVG path)</option>
        </select>
      </label>
      <label>radius <input id="r" type="range" min="60" max="200" value="160" /></label>
      <span class="muted" id="radius-note">(resizes the shape)</span>
      <label><input id="justify" type="checkbox" /> justify</label>
    </div>
    <canvas id="c" width="440" height="440"></canvas>

    <script type="module">
      import {
        shapeFlow, circle, subtract, rect, polygon, Canvas2DRenderer, PretextLineSource,
        canvasMeasurer, svgPathToRegion, svgPathToPolygon,
      } from '../dist/src/index.js';

      const FONT = '17px Georgia';
      const LINE_HEIGHT = 24;
      const TEXT =
        'Typography is the craft of arranging text so it is legible, readable, and ' +
        'beautiful. Here the words flow to fill a shape, each line as wide as the ' +
        'region allows at that height, recomputed without ever touching the DOM. ' +
        'Resize the shape and the same prepared text reflows instantly.';

      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');

      // Derive ascent from canvas metrics (Pretext is horizontal-only; vertical metrics are ours).
      ctx.font = FONT;
      const m = ctx.measureText('Mg');
      const ascent = m.actualBoundingBoxAscent || m.fontBoundingBoxAscent || LINE_HEIGHT * 0.8;

      // Build the source ONCE — the expensive prepare pass. Reflow reuses it.
      // Pass canvasMeasurer so PretextLineSource can populate per-word widths for justification.
      const source = new PretextLineSource(TEXT, FONT, canvasMeasurer(ctx, FONT));
      const renderer = new Canvas2DRenderer(FONT, { color: '#1a1a1a' });

      const cx = 220, cy = 220;

      // Heart SVG path centered around (220, 220), sized ~180px tall, using only M/L/C/Z.
      // The heart is defined in local coordinates and translated to (cx, cy).
      // Two symmetric cubic Bézier arcs form the two lobes; straight lines meet at the bottom tip.
      const HEART_PATH =
        'M 220 390 ' +
        'C 60 290 60 170 130 140 ' +
        'C 165 125 195 135 220 165 ' +
        'C 245 135 275 125 310 140 ' +
        'C 380 170 380 290 220 390 ' +
        'Z';

      /** Compute the 10 vertices of a 5-pointed star centred at (cx, cy). */
      function starPoints(outerR, innerR) {
        const pts = [];
        for (let i = 0; i < 10; i++) {
          // Start at the top (-π/2), alternate outer/inner radius.
          const angle = -Math.PI / 2 + (i * Math.PI) / 5;
          const r = i % 2 === 0 ? outerR : innerR;
          pts.push([cx + r * Math.cos(angle), cy + r * Math.sin(angle)]);
        }
        return pts;
      }

      function render() {
        const shape = document.getElementById('shape').value;
        const radius = +document.getElementById('r').value;

        let region;
        let drawOutline;

        if (shape === 'donut') {
          region = subtract(circle(cx, cy, radius), circle(cx, cy, radius * 0.42));
          drawOutline = () => {
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.moveTo(cx + radius * 0.42, cy);
            ctx.arc(cx, cy, radius * 0.42, 0, Math.PI * 2);
            ctx.stroke();
          };
        } else if (shape === 'star') {
          const outerR = radius;
          const innerR = radius * 0.42;
          const pts = starPoints(outerR, innerR);
          region = polygon(pts);
          drawOutline = () => {
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.closePath();
            ctx.stroke();
          };
        } else if (shape === 'heart') {
          region = svgPathToRegion(HEART_PATH);
          const heartPts = svgPathToPolygon(HEART_PATH);
          drawOutline = () => {
            ctx.beginPath();
            ctx.moveTo(heartPts[0][0], heartPts[0][1]);
            for (let i = 1; i < heartPts.length; i++) ctx.lineTo(heartPts[i][0], heartPts[i][1]);
            ctx.closePath();
            ctx.stroke();
          };
        } else {
          // circle (default)
          region = circle(cx, cy, radius);
          drawOutline = () => {
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.stroke();
          };
        }

        const justify = document.getElementById('justify').checked;
        const res = shapeFlow(source, region, {
          lineHeight: LINE_HEIGHT,
          ascent,
          multiSpan: 'fill',
          ...(justify ? { align: 'justify' } : {}),
        });

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // reference outline
        ctx.strokeStyle = '#ddd';
        drawOutline();
        // text
        renderer.render(res, ctx);

        if (res.overflow) {
          ctx.fillStyle = '#b00';
          ctx.font = '12px system-ui';
          ctx.fillText('(text overflowed)', 8, canvas.height - 8);
        }
      }

      document.getElementById('r').addEventListener('input', render);
      document.getElementById('shape').addEventListener('change', render);
      document.getElementById('justify').addEventListener('change', render);
      render();
    </script>
  </body>
</html>
