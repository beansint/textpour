<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300" role="img" font-family="system-ui, sans-serif">
  <title>Text in a box versus text poured into any shape</title>
  <desc>Left: a normal rectangular text box with uniform-width lines. Right: the same words poured into a circle, each line as wide as the circle is at that height.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="60" y="70" width="170" height="170" rx="8" fill="none" stroke="#cccccc" stroke-width="0.8"/>
  <g fill="#D3D1C7" stroke="#B4B2A9" stroke-width="0.5">
    <rect x="78" y="88"  width="134" height="12" rx="3"/>
    <rect x="78" y="112" width="134" height="12" rx="3"/>
    <rect x="78" y="136" width="134" height="12" rx="3"/>
    <rect x="78" y="160" width="134" height="12" rx="3"/>
    <rect x="78" y="184" width="134" height="12" rx="3"/>
    <rect x="78" y="208" width="100" height="12" rx="3"/>
  </g>
  <text x="145" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">a normal box</text>
  <text x="297" y="146" text-anchor="middle" font-size="12" fill="#5F5E5A">same words</text>
  <line x1="247" y1="155" x2="347" y2="155" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="470" cy="155" r="110" fill="none" stroke="#5DCAA5" stroke-width="0.8" stroke-dasharray="4 4"/>
  <g fill="#5DCAA5" stroke="#1D9E75" stroke-width="0.5">
    <rect x="389.5" y="73"  width="161" height="14" rx="3"/>
    <rect x="372"   y="98"  width="196" height="14" rx="3"/>
    <rect x="363"   y="123" width="214" height="14" rx="3"/>
    <rect x="360"   y="148" width="220" height="14" rx="3"/>
    <rect x="363"   y="173" width="214" height="14" rx="3"/>
    <rect x="372"   y="198" width="196" height="14" rx="3"/>
    <rect x="389.5" y="223" width="161" height="14" rx="3"/>
  </g>
  <text x="470" y="285" text-anchor="middle" font-size="12" fill="#5F5E5A">any shape you want</text>
</svg>
